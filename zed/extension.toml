id = "tsb"
name = "tsb"
description = "TypeScript with Rust-flavoured sugar — language support."
version = "0.3.0"
schema_version = 1
authors = ["Jonathan Turnock"]
repository = "https://github.com/flying-dice/bun-oas"

[language_servers.tsb]
name = "tsb"
languages = ["tsb"]

# No grammar declaration. Two attempts didn't work:
#   v0.1.0 declared `[grammars.typescript]` — collided with Zed's
#   built-in TS grammar and broke `.ts` highlighting editor-wide.
#   v0.2.0 renamed it to `[grammars.tsb]` — but the tree-sitter
#   compiler expects the parser's exported symbol (`tree_sitter_<name>`)
#   to match. The tree-sitter-typescript source exports
#   `tree_sitter_typescript`, so the rename produces a compile error.
#
# Until tsb has its own tree-sitter grammar (or a renamed fork of
# tree-sitter-typescript), .tsb files render as plain text in the
# editor. The LSP still provides diagnostics, completion, hover, and
# goto-definition.

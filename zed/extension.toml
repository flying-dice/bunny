id = "tsb"
name = "tsb"
description = "TypeScript with Rust-flavoured sugar — language support."
version = "0.2.0"
schema_version = 1
authors = ["Jonathan Turnock"]
repository = "https://github.com/flying-dice/bun-oas"

[language_servers.tsb]
name = "tsb"
languages = ["tsb"]

# Ship the TypeScript tree-sitter grammar under a tsb-scoped name so
# it can't collide with Zed's built-in `typescript` grammar (which
# previously broke TS highlighting editor-wide).
[grammars.tsb]
repository = "https://github.com/tree-sitter/tree-sitter-typescript"
commit = "d847898fec3fe596798c9fda55cb8c05a799001a"
path = "typescript"
